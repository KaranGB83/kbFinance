{% extends 'stocks/layout.html' %}
{% block title %}Sell Stocks{% endblock %}
{% block body %}
    <h2>SELL</h2>
    {% if message %}
        <div class="msg">
            <div class="alert alert-danger">{{ message }}</div>
        </div>
        <br>
    {% endif %}
    <form action="{% url 'stocks:sell' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <input autofocus class="form-control text-uppercase" type="text" name="symbol" placeholder="Symbol" value="{{ prefill_symbol }}">
        </div>
        <div class="form-group">
            <input class="form-control" type="number" name="quantity" placeholder="Quantity" min="1" required>
        </div>
        <input class="btn btn-danger" type="submit" value="SELL">
        <a href="{% url 'stocks:index' %}" class="btn btn-secondary ml-2">Cancel</a>
    </form>
{% endblock %}
