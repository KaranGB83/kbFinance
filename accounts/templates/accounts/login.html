{% extends 'stocks/layout.html' %}
{% block title %}Login to KB Finance{% endblock %}
{% block body %}
    <h2>Log IN</h2>
    {% if message %}
        <div>{{message}}</div>
    {% endif %}
    <form action="{% url 'accounts:login' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <input autofocus class="form-control" type="text" name="username" placeholder="Username">
        </div>
        <div class="form-group">
            <input class="form-control" type="password" name="password" placeholder="Password">
        </div>
        <input class="btn btn-primary" type="submit" value="Login">
    </form>
    
    Don't have an account? <a href="{% url 'accounts:register' %}">Register here.</a>
{% endblock %}
