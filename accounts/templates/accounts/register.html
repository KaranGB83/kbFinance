{% extends "stocks/layout.html" %}

{% block body %}

    <h2>Register</h2>

    {% if message %}
        <div class="msg">
            <div class="alert alert-danger">{{ message }}</div>
        </div>
        <br>
    {% endif %}

    <form action="{% url 'accounts:register' %}" method="post">
        {% csrf_token %}
        <div class="form-group">
            <input class="form-control" autofocus type="text" name="username" placeholder="Username">
        </div>
        <div class="form-group">
            <input class="form-control" type="email" name="email" placeholder="Email Address">
        </div>
        <div class="form-group">
            <input class="form-control" type="password" name="password" placeholder="Password">
        </div>
        <div class="form-group">
            <input class="form-control" type="password" name="confirmation" placeholder="Confirm Password">
        </div>
        <input class="btn btn-primary" type="submit" value="Register">
    </form>

    Already have an account? <a href="{% url 'accounts:login' %}">Log In here.</a>

{% endblock %}
{% block scripts %}
    <script>
        document.querySelector('form').addEventListener('submit', async function(e) {
            e.preventDefault();
            const username = this.querySelector('[name=username]').value;
            const password = this.querySelector('[name=password]').value;
            const regRes = await fetch(this.action, {
                method: 'POST',
                body: new FormData(this)
            });
            if (!regRes.url.includes('register')) {
                const jwtRes = await fetch('/api/token/', {
                    method: 'POST',
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({username, password})
                });
                if (jwtRes.ok) {
                    const data = await jwtRes.json();
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                }
                window.location.href = '/';
            } else {
                this.submit();
            }
        });
    </script>
{% endblock %}
